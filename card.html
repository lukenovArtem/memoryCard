<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory — Найди пару</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
        }

        /* ── Панель статистики ── */
        .stats {
            display: flex;
            gap: 30px;
            margin: 15px 0;
            font-size: 1.1rem;
        }

        .stats span {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .stats .value {
            font-weight: bold;
            color: #ffd700;
        }

        /* ── Выбор сложности ── */
        .difficulty {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .difficulty button {
            padding: 8px 22px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .difficulty button:hover,
        .difficulty button.active {
            background: #ffd700;
            color: #1a1a2e;
            border-color: #ffd700;
            font-weight: bold;
        }

        /* ── Игровое поле ── */
        .board {
            display: grid;
            gap: 12px;
            perspective: 1000px;
            margin: 10px 0;
        }

        .board.size-4 {
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
        }

        .board.size-6 {
            grid-template-columns: repeat(6, 90px);
            grid-template-rows: repeat(6, 90px);
        }

        /* ── Карточка ── */
        .card {
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            border-radius: 14px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg);
            cursor: default;
        }

        .card.matched .card-front {
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.6);
            border-color: #00ff64;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .card-back {
            background: linear-gradient(145deg, #3a3a6e, #2a2a5e);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .card-back::after {
            content: '?';
            font-size: 2.2rem;
            color: rgba(255, 255, 255, 0.25);
            font-weight: bold;
        }

        .board.size-6 .card-back::after {
            font-size: 1.8rem;
        }

        .card-front {
            background: linear-gradient(145deg, #1e1e3a, #2d2d5e);
            transform: rotateY(180deg);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            font-size: 2.8rem;
            transition: box-shadow 0.4s, border-color 0.4s;
        }

        .board.size-6 .card-front {
            font-size: 2.2rem;
        }

        .card:not(.flipped):not(.matched):hover .card-back {
            background: linear-gradient(145deg, #4a4a8e, #3a3a7e);
            border-color: rgba(255, 215, 0, 0.4);
        }

        /* ── Кнопка перезапуска ── */
        .restart-btn {
            margin-top: 15px;
            padding: 12px 35px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.5);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        /* ── Модальное окно победы ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: linear-gradient(145deg, #2a2a5e, #1a1a3e);
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.15);
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .modal h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .modal p {
            font-size: 1.15rem;
            margin: 8px 0;
            color: #ccc;
        }

        .modal .restart-btn {
            margin-top: 25px;
        }

        /* ── Анимация совпадения ── */
        @keyframes matchPulse {
            0%   { transform: rotateY(180deg) scale(1); }
            50%  { transform: rotateY(180deg) scale(1.12); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        .card.match-anim {
            animation: matchPulse 0.5s ease;
        }
    </style>
</head>
<body>

    <h1>🧠 MEMORY</h1>

    <div class="difficulty">
        <button class="active" data-size="4">4 × 4</button>
        <button data-size="6">6 × 6</button>
    </div>

    <div class="stats">
        <span>Ходы: <span class="value" id="moves">0</span></span>
        <span>Время: <span class="value" id="timer">0:00</span></span>
        <span>Пары: <span class="value" id="pairs">0 / 8</span></span>
    </div>

    <div class="board size-4" id="board"></div>

    <button class="restart-btn" id="restartBtn">🔄 Начать заново</button>

    <!-- Модалка победы -->
    <div class="modal-overlay" id="winModal">
        <div class="modal">
            <h2>🎉 Победа!</h2>
            <p>Вы нашли все пары!</p>
            <p>Ходов: <strong id="finalMoves"></strong></p>
            <p>Время: <strong id="finalTime"></strong></p>
            <button class="restart-btn" id="playAgainBtn">🔄 Играть снова</button>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        //  Конфигурация и состояние
        // ═══════════════════════════════════════

        const EMOJIS_4 = [
            '🐶','🐱','🐸','🦊','🐻','🐼','🐨','🦁'
        ];
        const EMOJIS_6 = [
            '🐶','🐱','🐸','🦊','🐻','🐼','🐨','🦁',
            '🐯','🐮','🐷','🐙','🦄','🐝','🦋','🐞','🐢','🐬'
        ];

        let gridSize = 4;          // 4 или 6
        let cards = [];            // массив карточек
        let flippedCards = [];     // текущие открытые (макс 2)
        let moves = 0;
        let matchedPairs = 0;
        let totalPairs = 0;
        let timerInterval = null;
        let seconds = 0;
        let lockBoard = false;     // блокировка на время анимации
        let gameStarted = false;

        const boardEl    = document.getElementById('board');
        const movesEl    = document.getElementById('moves');
        const timerEl    = document.getElementById('timer');
        const pairsEl    = document.getElementById('pairs');
        const winModal   = document.getElementById('winModal');
        const finalMoves = document.getElementById('finalMoves');
        const finalTime  = document.getElementById('finalTime');

        // ═══════════════════════════════════════
        //  Выбор сложности
        // ═══════════════════════════════════════

        document.querySelectorAll('.difficulty button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.difficulty .active').classList.remove('active');
                btn.classList.add('active');
                gridSize = parseInt(btn.dataset.size);
                initGame();
            });
        });

        // ═══════════════════════════════════════
        //  Инициализация игры
        // ═══════════════════════════════════════

        function initGame() {
            // Сброс
            clearInterval(timerInterval);
            timerInterval = null;
            seconds = 0;
            moves = 0;
            matchedPairs = 0;
            flippedCards = [];
            lockBoard = false;
            gameStarted = false;

            movesEl.textContent = '0';
            timerEl.textContent = '0:00';
            winModal.classList.remove('show');

            totalPairs = (gridSize * gridSize) / 2;
            pairsEl.textContent = `0 / ${totalPairs}`;

            // Выбираем эмодзи и дублируем
            const source = gridSize === 4 ? EMOJIS_4 : EMOJIS_6;
            const chosen = source.slice(0, totalPairs);
            cards = shuffle([...chosen, ...chosen]);

            // Строим доску
            boardEl.innerHTML = '';
            boardEl.className = `board size-${gridSize}`;

            cards.forEach((emoji, i) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.index = i;
                card.dataset.emoji = emoji;

                card.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">${emoji}</div>
                `;

                card.addEventListener('click', () => flipCard(card));
                boardEl.appendChild(card);
            });
        }

        // ═══════════════════════════════════════
        //  Переворот карточки
        // ═══════════════════════════════════════

        function flipCard(card) {
            if (lockBoard) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            // Запуск таймера при первом клике
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                movesEl.textContent = moves;
                checkMatch();
            }
        }

        // ═══════════════════════════════════════
        //  Проверка совпадения
        // ═══════════════════════════════════════

        function checkMatch() {
            const [a, b] = flippedCards;

            if (a.dataset.emoji === b.dataset.emoji) {
                // Совпадение!
                lockBoard = true;
                setTimeout(() => {
                    a.classList.add('matched', 'match-anim');
                    b.classList.add('matched', 'match-anim');
                    matchedPairs++;
                    pairsEl.textContent = `${matchedPairs} / ${totalPairs}`;
                    flippedCards = [];
                    lockBoard = false;

                    if (matchedPairs === totalPairs) {
                        clearInterval(timerInterval);
                        setTimeout(showWin, 500);
                    }
                }, 300);
            } else {
                // Не совпали — закрыть через паузу
                lockBoard = true;
                setTimeout(() => {
                    a.classList.remove('flipped');
                    b.classList.remove('flipped');
                    flippedCards = [];
                    lockBoard = false;
                }, 900);
            }
        }

        // ═══════════════════════════════════════
        //  Таймер
        // ═══════════════════════════════════════

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // ═══════════════════════════════════════
        //  Победа
        // ═══════════════════════════════════════

        function showWin() {
            finalMoves.textContent = moves;
            finalTime.textContent = timerEl.textContent;
            winModal.classList.add('show');
        }

        // ═══════════════════════════════════════
        //  Перезапуск
        // ═══════════════════════════════════════

        document.getElementById('restartBtn').addEventListener('click', initGame);
        document.getElementById('playAgainBtn').addEventListener('click', initGame);

        // ═══════════════════════════════════════
        //  Утилита: перемешивание (Fisher-Yates)
        // ═══════════════════════════════════════

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ═══════════════════════════════════════
        //  Старт!
        // ═══════════════════════════════════════

        initGame();
    </script>

</body>
</html>
